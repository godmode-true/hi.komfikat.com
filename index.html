<!doctype html>
<html lang="en">
  <head>
    <!-- 1. Basic meta -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- 2. SEO -->
    <title>Komfi Kat | Cozy & Cute Coloring Books</title>
    <meta name="description" content="Cozy hand-drawn coloring books by Komfi Kat." />
    <meta
      name="keywords"
      content="coloring books for adults, hand drawn coloring books, cute and cozy coloring books, stress relief coloring books, mindfulness coloring books, relaxation coloring books"
    />
    <meta name="author" content="Komfi Kat" />
    <link rel="canonical" href="https://hi.komfikat.com" />

    <!-- 3. Open Graph (social sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Komfi Kat" />
    <meta property="og:title" content="Komfi Kat | Cozy & Cute Coloring Books" />
    <meta property="og:description" content="Start your cozy coloring journey!" />
    <meta property="og:url" content="https://hi.komfikat.com" />
    <meta property="og:image" content="https://hi.komfikat.com/img/og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- 4. Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Komfi Kat | Cozy & Cute Coloring Books" />
    <meta name="twitter:description" content="Start your cozy coloring journey!" />
    <meta name="twitter:image" content="https://hi.komfikat.com/img/og.jpg" />

    <!-- 5. Theme / PWA -->
    <meta name="theme-color" content="#fdfcf3" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Komfi Kat" />

    <!-- 6. Icons -->
    <link rel="icon" href="img/icons/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="img/icons/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="img/icons/apple-touch-icon.png" />

    <!-- 7. Manifest -->
    <link rel="manifest" href="site.webmanifest" />

    <!-- 8. Preconnect (performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 9. Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&display=swap" rel="stylesheet" />

    <!-- 10. CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- 11. JS -->
    <script src="js/main.js" defer></script>
  </head>

  <body>
    <main class="container"></main>
  </body>
</html>
