<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Komfi Kat • Cozy & Cute Coloring Books</title>
    <meta name="description" content="Cozy hand-drawn coloring books by Komfi Kat." />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="Komfi Kat" />
    <link rel="canonical" href="https://hi.komfikat.com" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Komfi Kat" />
    <meta property="og:title" content="Komfi Kat | Cozy & Cute Coloring Books" />
    <meta property="og:description" content="Start your cozy coloring journey!" />
    <meta property="og:url" content="https://hi.komfikat.com" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Komfi Kat | Cozy & Cute Coloring Books" />
    <meta name="twitter:description" content="Start your cozy coloring journey!" />

    <meta name="theme-color" content="#fdfcf3" />
    <link rel="icon" href="img/icons/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="img/icons/favicon.png" type="image/png" sizes="200x200" />
    <link rel="apple-touch-icon" href="img/icons/apple-touch-icon.png" />
    <script>
      try {
        const savedTheme = localStorage.getItem("komfi-theme");
        if (savedTheme === "dark") {
          document.documentElement.dataset.theme = "dark";
        }
      } catch {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&display=swap"
    />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&display=swap" />

    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
  </head>

  <body>
    <main class="page">
      <div class="container">
        <header class="top-bar" aria-label="Page actions">
          <button class="action-button" type="button">
            <span class="action-button__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M12 4.25C9.93 4.25 8.25 5.93 8.25 8V10.28C8.25 10.76 8.08 11.23 7.76 11.59L6.82 12.66C6.01 13.58 6.66 15 7.88 15H16.12C17.34 15 17.99 13.58 17.18 12.66L16.24 11.59C15.92 11.23 15.75 10.76 15.75 10.28V8C15.75 5.93 14.07 4.25 12 4.25Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M10.2 17.2C10.55 17.85 11.22 18.25 12 18.25C12.78 18.25 13.45 17.85 13.8 17.2"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <span class="action-button__label">SUBSCRIBE</span>
          </button>
          <div class="top-bar__actions cluster">
            <button class="action-button action-button--icon-only" type="button" aria-label="Share" title="Share">
              <span class="action-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M12 14.75V5.75"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M8.8 8.95L12 5.75L15.2 8.95"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M7.25 12.7V15.35C7.25 16.7 8.35 17.8 9.7 17.8H14.3C15.65 17.8 16.75 16.7 16.75 15.35V12.7"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
            </button>

            <button
              class="theme-toggle"
              type="button"
              aria-label="Switch to dark mode"
              aria-pressed="false"
              title="Switch to dark mode"
              data-theme-toggle
            >
              <svg
                class="theme-toggle__icon theme-toggle__icon--sun"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="3.6" stroke="currentColor" stroke-width="1.8" />
                <path d="M12 3.5V6.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M12 17.9V20.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M3.5 12H6.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M17.9 12H20.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M6 6L7.8 7.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M16.2 16.2L18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M6 18L7.8 16.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M16.2 7.8L18 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              </svg>
              <svg
                class="theme-toggle__icon theme-toggle__icon--moon"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <path
                  d="M15.25 4.95C14.35 4.6 13.37 4.4 12.35 4.4C7.97 4.4 4.42 7.95 4.42 12.33C4.42 16.71 7.97 20.26 12.35 20.26C15.95 20.26 19 17.86 19.98 14.58C19.22 14.93 18.37 15.12 17.48 15.12C14.15 15.12 11.45 12.42 11.45 9.09C11.45 7.52 12.05 6.1 13.04 5.04"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
        </header>

        <section class="profile stack" aria-label="Brand profile">
          <a
            class="profile__logo-link"
            href="https://komfikat.com"
            aria-label="Visit the main Komfi Kat website"
            data-tooltip="Click to visit komfikat.com"
          >
            <div class="profile__logo-frame">
              <img class="profile__logo" src="img/logo.png" alt="Komfi Kat logo" />
            </div>
          </a>
          <div class="profile__copy stack">
            <h1 class="profile__title">Komfi Kat</h1>
            <p class="profile__tagline">Cozy &amp; Relaxing Coloring Books</p>
          </div>
        </section>

        <section class="social-links" aria-label="Social media links">
          <ul class="social-links__list cluster">
            <li>
              <a class="social-links__link" href="#" aria-label="Instagram">
                <img class="social-links__icon" src="img/socials/instagram.svg" alt="" />
              </a>
            </li>
            <li>
              <a class="social-links__link" href="#" aria-label="TikTok">
                <img class="social-links__icon" src="img/socials/tiktok.svg" alt="" />
              </a>
            </li>
            <li>
              <a class="social-links__link" href="#" aria-label="YouTube">
                <img class="social-links__icon" src="img/socials/youtube.svg" alt="" />
              </a>
            </li>
            <li>
              <a class="social-links__link" href="#" aria-label="Threads">
                <img class="social-links__icon" src="img/socials/threads.svg" alt="" />
              </a>
            </li>
            <li>
              <a class="social-links__link" href="#" aria-label="Pinterest">
                <img class="social-links__icon" src="img/socials/pinterest.svg" alt="" />
              </a>
            </li>
          </ul>
        </section>

        <section class="link-section" aria-label="Shop links">
          <ul class="link-list stack">
            <li>
              <a
                class="link-card link-card--etsy"
                href="https://komfikatcoloring.etsy.com/"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Shop on Etsy for digital coloring books"
              >
                <span class="link-card__badge" aria-hidden="true">
                  <img class="link-card__brand-icon link-card__brand-icon--etsy" src="img/icons/etsy.svg" alt="" />
                </span>
                <span class="link-card__content">
                  <span class="link-card__title">Shop on Etsy</span>
                  <span class="link-card__subtitle">Digital Coloring Books</span>
                </span>
                <span class="link-card__spacer" aria-hidden="true"></span>
              </a>
            </li>
            <li>
              <div class="link-card link-card--amazon link-card--disabled" aria-label="Amazon coming soon" aria-disabled="true">
                <span class="link-card__badge" aria-hidden="true">
                  <img class="link-card__brand-icon link-card__brand-icon--amazon" src="img/icons/amazon.svg" alt="" />
                </span>
                <span class="link-card__content">
                  <span class="link-card__title">Coming Soon on Amazon</span>
                  <span class="link-card__subtitle">Physical Coloring Books</span>
                </span>
                <span class="link-card__spacer" aria-hidden="true"></span>
              </div>
            </li>
          </ul>
        </section>
      </div>
    </main>
  </body>
</html>
