    <script>
      try {
        const root = document.documentElement;
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        const savedTheme = localStorage.getItem("komfi-theme");
        const initialTheme = savedTheme === "dark" ? "dark" : "light";
        const defaultPreset = window.KomfiKatThemeConfig?.defaultPreset || root.dataset.defaultPreset || "default-rose";
        const preset = window.KomfiKatThemePresets?.[defaultPreset];
        const initialThemeTokens = preset?.[initialTheme];
        const initialThemeColor =
          initialThemeTokens?.["--browser-chrome-color"] || (initialTheme === "dark" ? "#4a3b40" : "#fde7ef");
        root.dataset.theme = initialTheme;
        root.dataset.themePreset = defaultPreset;
        if (themeColorMeta) {
          themeColorMeta.setAttribute("content", initialThemeColor);
        }
      } catch {}
    </script>

                  />

            </li>
            <li>
              <a

                href="https://www.pinterest.com/komfikat/"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Pinterest"
              >
                <svg
                  class="social-links__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path

        </section>

        <section class="promo-carousel" aria-label="Latest carousel previews">
          <div class="promo-carousel__shell" data-promo-carousel>
            <span class="promo-carousel__badge">NEW</span>

            <div class="promo-carousel__viewport" data-promo-carousel-viewport>
              <div class="promo-carousel__track" data-promo-carousel-track></div>
            </div>

            <div class="promo-carousel__pager">
              <button
                class="promo-carousel__nav promo-carousel__nav--prev"
                type="button"
                aria-label="Previous carousel slide"
                data-promo-carousel-prev
              >
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M15.76 5.56C16.55 4.99 17.67 5.55 17.67 6.52V17.48C17.67 18.45 16.55 19.01 15.76 18.44L8.27 13.01C7.59 12.52 7.59 11.48 8.27 10.99L15.76 5.56Z"
                    fill="currentColor"
                  />
                </svg>
              </button>

              <div class="promo-carousel__dots" data-promo-carousel-dots aria-label="Carousel pagination"></div>

              <button
                class="promo-carousel__nav promo-carousel__nav--next"
                type="button"
                aria-label="Next carousel slide"
                data-promo-carousel-next
              >
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M8.24 5.56C7.45 4.99 6.33 5.55 6.33 6.52V17.48C6.33 18.45 7.45 19.01 8.24 18.44L15.73 13.01C16.41 12.52 16.41 11.48 15.73 10.99L8.24 5.56Z"
                    fill="currentColor"
                  />
                </svg>
              </button>
            </div>
          </div>
        </section>

        <section class="link-section" aria-label="Shop links">
          <ul class="link-list stack">
            <li>
              <a
                class="link-card link-card--etsy"
                href="https://komfikatcoloring.etsy.com/"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Shop on Etsy for digital coloring books"
              >
                <span class="link-card__badge" aria-hidden="true">
                  <img
                    class="link-card__brand-icon link-card__brand-icon--etsy"
                    src="img/icons/etsy.svg"
                    alt=""
                    width="24"
                    height="24"
                    decoding="async"
                  />
                </span>
                <span class="link-card__content">
                  <span class="link-card__title">Etsy Shop</span>
                  <span class="link-card__subtitle">Digital Coloring Books &amp; More</span>
                </span>
                <span class="link-card__spacer" aria-hidden="true"></span>
              </a>
            </li>
            <li>
              <div
                class="link-card link-card--amazon link-card--disabled"
                aria-label="Amazon coming soon"
                aria-disabled="true"
              >
                <span class="link-card__badge" aria-hidden="true">
                  <img
                    class="link-card__brand-icon link-card__brand-icon--amazon"
                    src="img/icons/amazon.svg"
                    alt=""
                    width="24"
                    height="24"
                    decoding="async"
                  />
                </span>
                <span class="link-card__content">
                  <span class="link-card__title">Amazon Shop</span>
                  <span class="link-card__subtitle">Coming soon</span>
                </span>
                <span class="link-card__spacer" aria-hidden="true"></span>
              </div>
            </li>
            <li>
              <div
                class="link-card link-card--website link-card--disabled"
                aria-label="Website coming soon"
                aria-disabled="true"
              >
                <span class="link-card__badge" aria-hidden="true">
                  <img
                    class="link-card__brand-icon link-card__brand-icon--website"
                    src="img/icons/favicon.png"
                    alt=""
                    width="200"
                    height="200"
                    decoding="async"
                  />
                </span>
                <span class="link-card__content">
                  <span class="link-card__title">Website</span>
                  <span class="link-card__subtitle">Coming soon</span>
                </span>
                <span class="link-card__spacer" aria-hidden="true"></span>
              </div>
            </li>
          </ul>
        </section>

        <dialog class="story-viewer" data-story-viewer aria-labelledby="story-viewer-title">
          <form class="story-viewer__backdrop" method="dialog">
            <button class="story-viewer__backdrop-dismiss" value="cancel" aria-label="Close stories"></button>
          </form>

          <div class="story-viewer__surface">
            <div class="story-viewer__progress" data-story-progress aria-hidden="true"></div>

            <div class="story-viewer__header">
              <div class="story-viewer__brand">
                <span class="story-viewer__brand-mark" aria-hidden="true">
                  <img src="img/logo.webp" alt="" width="1200" height="1200" decoding="async" />
                </span>
                <div class="story-viewer__brand-copy">
                  <p class="story-viewer__eyebrow" data-story-eyebrow>Komfi Kat</p>
                  <h2 class="story-viewer__title" id="story-viewer-title" data-story-title>Komfi Kat Updates</h2>
                </div>
              </div>

              <div class="story-viewer__header-actions">
                <button
                  class="story-viewer__control"
                  type="button"
                  aria-label="Pause stories"
                  data-story-toggle-playback
                >
                  <svg
                    class="story-viewer__control-icon story-viewer__control-icon--pause"
                    viewBox="0 0 24 24"
                    fill="none"
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path d="M9 7.25V16.75" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" />
                    <path d="M15 7.25V16.75" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" />
                  </svg>
                  <svg
                    class="story-viewer__control-icon story-viewer__control-icon--play"
                    viewBox="0 0 24 24"
                    fill="none"
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M9.4 7.6L16.35 12L9.4 16.4V7.6Z"
                      fill="currentColor"
                      stroke="currentColor"
                      stroke-width="0.6"
                      stroke-linejoin="round"
                    />
                  </svg>
                </button>

                <button class="story-viewer__close" type="button" aria-label="Close stories" data-story-close>
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 7L17 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    <path d="M17 7L7 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="story-viewer__card">
              <div class="story-viewer__media">
                <button
                  class="story-viewer__nav story-viewer__nav--prev"
                  type="button"
                  aria-label="Previous story"
                  data-story-prev
                ></button>
                <div class="story-viewer__media-frame" data-story-frame>
                  <img
                    class="story-viewer__image"
                    src="img/logo.webp"
                    alt=""
                    width="1080"
                    height="1350"
                    decoding="async"
                    data-story-image
                    draggable="false"
                  />
                </div>
                <button
                  class="story-viewer__nav story-viewer__nav--next"
                  type="button"
                  aria-label="Next story"
                  data-story-next
                ></button>
              </div>
            </div>

            <div class="story-viewer__body">
              <p class="story-viewer__meta" data-story-meta>Instagram reel</p>
              <p class="story-viewer__description" data-story-description>
                Cozy peeks, new releases, and little Komfi Kat moments.
              </p>
            </div>

            <div class="story-viewer__footer">
              <button class="story-viewer__cta" type="button" data-story-cta>Open on Instagram</button>
            </div>
          </div>
        </dialog>

      </div>
    </main>
  </body>
</html>
